# SD-card layout for the RG35xxSP. Offsets/partition scheme follow the vendor
# image — extract u-boot.bin, the kernel Image, the .dtb and boot.scr from a
# working Knulli/muOS card for this exact model and drop them in board/rg35xxsp/blobs/.
# genimage runs from post-image.sh after Buildroot builds rootfs.ext4.

image boot.vfat {
	vfat {
		files = {
			"Image",
			"sun50i-h700-anbernic-rg35xxsp.dtb",
			"boot.scr"
		}
	}
	size = 64M
}

image sdcard.img {
	hdimage {
	}

	# raw U-Boot at the Allwinner SPL offset (8 KiB)
	partition uboot {
		in-partition-table = "no"
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8K
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}

	# persistent user state (tokens, saved wifi, recent dirs) — survives A/B rootfs updates
	partition data {
		partition-type = 0x83
		image = "data.ext4"
	}
}
