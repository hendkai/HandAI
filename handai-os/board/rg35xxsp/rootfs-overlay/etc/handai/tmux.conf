# HandAI tmux config — loaded for local sessions (router uses `tmux -f` when
# $HANDAI_TMUX_CONF is set). Provides the gamepad "compose" popup so you can type
# into the agent with only the on-screen keyboard.

# Optional USB/Bluetooth keyboard shortcut. The built-in gamepad uses the
# fullscreen pixel console and its native on-screen keyboard instead.
bind -n F2 display-popup -w 90% -h 80% -E \
	"python3 -m handai compose --target '#{session_name}'"

# Same under the prefix, for when a real keyboard is attached.
bind o display-popup -w 90% -h 80% -E \
	"python3 -m handai compose --target '#{session_name}'"

# handheld-friendly defaults
set -g mouse off
set -g status off
set -g escape-time 10
# Gateway credentials arrive in the tmux client environment. Updating these
# names lets a new session inherit them even when the local tmux server already
# existed; no login token is embedded in a pane command or process argument.
set -g update-environment "OPENCLAW_GATEWAY_URL OPENCLAW_GATEWAY_TOKEN"
