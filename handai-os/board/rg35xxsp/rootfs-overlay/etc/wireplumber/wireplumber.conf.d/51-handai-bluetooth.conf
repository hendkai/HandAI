# HandAI runs one system-wide PipeWire/WirePlumber session without logind.
# Make Bluetooth discovery independent of seats and reconnect both playback
# and headset-microphone profiles after a paired headset returns.
wireplumber.profiles = {
  main = {
    support.reserve-device = disabled
    monitor.alsa.reserve-device = disabled
    support.portal-permissionstore = disabled
    script.client.access-portal = disabled
    support.logind = disabled
    monitor.bluez.seat-monitoring = disabled
  }
}

monitor.bluez.properties = {
  bluez5.hfphsp-backend = "native"
}

monitor.bluez.rules = [
  {
    matches = [
      {
        device.name = "~bluez_card.*"
      }
    ]
    actions = {
      update-props = {
        bluez5.auto-connect = [ hfp_hf hfp_ag a2dp_sink a2dp_source ]
      }
    }
  }
]
